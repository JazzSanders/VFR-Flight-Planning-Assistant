<!doctype html>
<html lang="en">
  <head>
    <!--
    
      VFR Flight Planning Assistant: Web Application for CSC272
      Author: Jasmine Sanders
      Date: 02/21/2025

      Filename: index.html
      Required Files: 
      Description: Project 2 for CSC272 Class: VFR Flight Planning Assistant Web Application

   -->

    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>VFR Flight Planning Assistant</title>
    <link rel="stylesheet" href="index-styles.css" />
  </head>
  <body>
    <div class="app-container">
      <header>
        <h1>VFR Flight Planning Assistant</h1>
        <nav class="calc-tabs">
          <button class="tab-btn active" onclick="showCalc(event, 'nav-wind')">
            Nav & Wind
          </button>
          <button class="tab-btn" onclick="showCalc(event, 'performance')">
            Performance
          </button>
          <button class="tab-btn" onclick="showCalc(event, 'weather')">
            Weather
          </button>
        </nav>
      </header>

      <main>
        <section id="nav-wind" class="calc-section">
          <h3>Heading & Groundspeed</h3>
          <div class="input-grid">
            <div class="input-group">
              <label>True Course (°)</label>
              <input type="number" id="tc" placeholder="090" />
            </div>
            <div class="input-group">
              <label>True Airspeed (kts)</label>
              <input type="number" id="tas_in" placeholder="110" />
            </div>
            <div class="input-group">
              <label>Wind Direction (°)</label>
              <input type="number" id="wd" placeholder="180" />
            </div>
            <div class="input-group">
              <label>Wind Speed (kts)</label>
              <input type="number" id="ws" placeholder="15" />
            </div>
          </div>
          <button
            type="button"
            class="calculate-btn"
            onclick="calcWindTriangle()"
          >
            CALC HEADING/GS
          </button>

          <hr style="margin: 20px 0; border: 1px solid #333" />

          <h3>Find Wind from Flight Data</h3>
          <div class="input-grid">
            <div class="input-group">
              <label>Observed Heading (°)</label>
              <input type="number" id="th_observed" placeholder="085" />
            </div>
            <div class="input-group">
              <label>Observed GS (kts)</label>
              <input type="number" id="gs_observed" placeholder="95" />
            </div>
            <div class="input-group">
              <label>Planned Course (°)</label>
              <input type="number" id="tc_solve" placeholder="090" />
            </div>
            <div class="input-group">
              <label>Current TAS (kts)</label>
              <input type="number" id="tas_solve" placeholder="105" />
            </div>
          </div>
          <button
            type="button"
            class="calculate-btn secondary"
            onclick="findActualWind()"
          >
            SOLVE FOR WIND
          </button>

          <div id="wind-results" class="results-panel hidden">
            <div class="result-grid">
              <div class="result-box highlight">
                <span>WCA</span><span id="res-wca">--</span>
              </div>
              <div class="result-box highlight">
                <span>Heading</span><span id="res-th">--</span>
              </div>
              <div class="result-box highlight">
                <span>Groundspeed</span><span id="res-gs">--</span>
              </div>
              <div class="result-box highlight">
                <span>Solved Wind</span><span id="res-actual-wind">--</span>
              </div>
            </div>
          </div>
        </section>

        <section id="performance" class="calc-section hidden">
          <h3>Airspeed Conversions</h3>
          <div class="input-grid">
            <div class="input-group">
              <label>Speed (kts)</label>
              <input type="number" id="speed_val" placeholder="100" />
            </div>
            <div class="input-group">
              <label>Altitude (ft)</label>
              <input type="number" id="alt_air" placeholder="5500" />
            </div>
          </div>
          <div class="input-grid">
            <button type="button" class="calculate-btn" onclick="calcTAS()">
              IAS TO TAS
            </button>
            <button type="button" class="calculate-btn" onclick="calcIAS()">
              TAS TO IAS
            </button>
          </div>

          <hr style="margin: 20px 0; border: 1px solid #333" />

          <h3>Time & Fuel</h3>
          <div class="input-grid">
            <div class="input-group">
              <label>Distance (nm)</label>
              <input type="number" id="dist" placeholder="50" />
            </div>
            <div class="input-group">
              <label>Groundspeed (kts)</label>
              <input type="number" id="gs_perf" placeholder="100" />
            </div>
            <div class="input-group">
              <label>Fuel Burn (gph)</label>
              <input type="number" id="burn_rate" placeholder="8.5" />
            </div>
          </div>
          <button type="button" class="calculate-btn" onclick="calcTimeFuel()">
            CALC TIME & FUEL
          </button>

          <div id="perf-results" class="results-panel hidden">
            <div class="result-grid">
              <div class="result-box highlight">
                <span id="res-airspeed-label">Airspeed</span
                ><span id="res-airspeed-val">--</span>
              </div>
              <div class="result-box highlight">
                <span>Time Enroute</span><span id="res-time">--</span>
              </div>
              <div class="result-box highlight">
                <span>Fuel Required</span><span id="res-fuel">--</span>
              </div>
            </div>
          </div>
        </section>

        <section id="weather" class="calc-section hidden">
          <h3>Meteorological Data</h3>
          <div class="input-grid">
            <div class="input-group">
              <label>Temp (°C)</label>
              <input type="number" id="w-temp" placeholder="25" />
            </div>
            <div class="input-group">
              <label id="variable-label">Dewpoint or RH</label>
              <input type="number" id="w-variable" placeholder="15" />
            </div>
          </div>
          <div class="input-grid">
            <button
              type="button"
              class="calculate-btn"
              onclick="
                updateWeatherLabel('Dewpoint');
                calcHumidity();
              "
            >
              FIND HUMIDITY
            </button>
            <button
              type="button"
              class="calculate-btn"
              onclick="
                updateWeatherLabel('RH (%)');
                calcDewpoint();
              "
            >
              FIND DEWPOINT
            </button>
          </div>

          <div id="weather-results" class="results-panel hidden">
            <div class="result-box highlight">
              <span>Result</span><span id="res-weather-val">--</span>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="index.js"></script>
  </body>
</html>
